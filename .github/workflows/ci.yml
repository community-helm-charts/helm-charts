name: CI

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/ci.yml"
      - "charts/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "scripts/**"
      - "tests/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  CHART_NAMESPACE: community-helm-charts
  HELM_VERSION: v3.16.4

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.1.2
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Run chart versioner tests
        run: pnpm test

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump changed chart versions
        id: versioner
        run: |
          set -euo pipefail

          base_sha="${{ github.event.before || '' }}"
          head_sha="${{ github.sha }}"

          if [[ -z "${base_sha}" || "${base_sha}" =~ ^0+$ ]]; then
            base_sha="HEAD~1"
          fi

          scripts/chart-versioner write \
            --base "${base_sha}" \
            --head "${head_sha}" \
            --output /tmp/chart-version-plan.json \
            --github-output "${GITHUB_OUTPUT}"

      - name: Commit chart version bumps
        if: steps.versioner.outputs.has_changes == 'true'
        run: |
          set -euo pipefail

          git add charts/*/Chart.yaml
          if git diff --cached --quiet; then
            echo "No chart version changes to commit."
            exit 0
          fi

          git commit -m "chore: bump chart versions"
          git push origin HEAD:main

      - name: Vendor local chart dependencies
        if: steps.versioner.outputs.has_changes == 'true'
        env:
          CHANGED_CHARTS: ${{ steps.versioner.outputs.changed_charts }}
        run: |
          set -euo pipefail

          IFS=',' read -r -a charts <<< "${CHANGED_CHARTS}"

          needs_common=false
          for chart in "${charts[@]}"; do
            if [[ "${chart}" != "common" ]]; then
              needs_common=true
              break
            fi
          done

          if [[ "${needs_common}" != "true" ]]; then
            exit 0
          fi

          mkdir -p /tmp/common-chart-package
          common_package="$(helm package charts/common --destination /tmp/common-chart-package | awk '{print $NF}')"

          for chart in "${charts[@]}"; do
            if [[ "${chart}" == "common" ]]; then
              continue
            fi

            chart_dir="charts/${chart}"
            mkdir -p "${chart_dir}/charts"
            rm -rf "${chart_dir}/charts"/*
            cp "${common_package}" "${chart_dir}/charts/"
          done

      - name: Log in to the Container registry
        if: steps.versioner.outputs.has_changes == 'true'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login "${REGISTRY}" \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Lint Helm charts
        if: steps.versioner.outputs.has_changes == 'true'
        env:
          CHANGED_CHARTS: ${{ steps.versioner.outputs.changed_charts }}
        run: |
          set -euo pipefail

          IFS=',' read -r -a charts <<< "${CHANGED_CHARTS}"
          chart_dirs=()
          for chart in "${charts[@]}"; do
            chart_dirs+=("charts/${chart}")
          done

          helm lint "${chart_dirs[@]}"

      - name: Package Helm charts
        if: steps.versioner.outputs.has_changes == 'true'
        env:
          CHANGED_CHARTS: ${{ steps.versioner.outputs.changed_charts }}
        run: |
          set -euo pipefail

          mkdir -p dist

          IFS=',' read -r -a charts <<< "${CHANGED_CHARTS}"
          for chart_name in "${charts[@]}"; do
            chart_dir="charts/${chart_name}"
            helm package "${chart_dir}" --destination dist
          done

      - name: Push Helm charts
        if: steps.versioner.outputs.has_changes == 'true'
        run: |
          set -euo pipefail
          shopt -s nullglob

          chart_repository="oci://${REGISTRY}/${CHART_NAMESPACE}"

          for package in dist/*.tgz; do
            helm push "${package}" "${chart_repository}"
          done
