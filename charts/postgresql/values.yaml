global:
  imageRegistry: ""
  imagePullSecrets: []
  defaultStorageClass: ""
  storageClass: ""
  postgresql:
    fullnameOverride: ""
    auth:
      username: ""
      password: ""
      database: ""
      existingSecret: ""
      secretKeys:
        passwordKey: ""
    service:
      ports:
        postgresql: ""

kubeVersion: ""
nameOverride: ""
fullnameOverride: ""
namespaceOverride: ""
clusterDomain: cluster.local
commonLabels: {}
commonAnnotations: {}
secretAnnotations: {}
extraDeploy: []

image:
  registry: docker.io
  repository: library/postgres
  tag: 18.3-alpine
  digest: ""
  pullPolicy: IfNotPresent
  pullSecrets: []

auth:
  trustAuthentication: false
  username: postgres
  password: ""
  database: ""
  existingSecret: ""
  secretKeys:
    passwordKey: password

containerPorts:
  postgresql: 5432

service:
  enabled: true
  type: ClusterIP
  ports:
    postgresql: 5432
  nodePorts:
    postgresql: ""
  clusterIP: ""
  annotations: {}
  labels: {}
  loadBalancerClass: ""
  loadBalancerIP: ""
  loadBalancerSourceRanges: []
  externalTrafficPolicy: Cluster
  sessionAffinity: None
  sessionAffinityConfig: {}
  extraPorts: []

headlessService:
  annotations: {}

persistence:
  enabled: true
  volumeName: data
  mountPath: /var/lib/postgresql
  subPath: ""
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 8Gi
  annotations: {}
  labels: {}
  selector: {}
  dataSource: {}
  existingClaim: ""

initdb:
  args: ""
  walDir: ""
  scripts: {}
  scriptsConfigMap: ""
  scriptsSecret: ""

command: []
args: []
extraEnvVars: []
extraEnvVarsCM: ""
extraEnvVarsSecret: ""
extraVolumes: []
extraVolumeMounts: []
initContainers: []
sidecars: []

podLabels: {}
podAnnotations: {}
podSecurityContext:
  enabled: false
  fsGroupChangePolicy: Always
  sysctls: []
  supplementalGroups: []
  fsGroup: 999
containerSecurityContext:
  enabled: false
  runAsUser: 999
  runAsGroup: 999
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

resourcesPreset: none
resources: {}

startupProbe:
  enabled: true
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30
  successThreshold: 1
livenessProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
  successThreshold: 1
readinessProbe:
  enabled: true
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
  successThreshold: 1
customStartupProbe: {}
customLivenessProbe: {}
customReadinessProbe: {}

updateStrategy:
  type: RollingUpdate
priorityClassName: ""
schedulerName: ""
terminationGracePeriodSeconds: ""
hostAliases: []
affinity: {}
nodeSelector: {}
tolerations: []
topologySpreadConstraints: []

serviceAccount:
  create: true
  name: ""
  automountServiceAccountToken: false
  annotations: {}

automountServiceAccountToken: false
